name: Deploy Pages
on:
  push:
    branches: [main]
    paths-ignore:
      - 'preferences.json'   # アプリの保存コミットでは再デプロイしない
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
# Pages allows only one in-progress deployment per environment. Queue new
# runs and let the running one finish instead of cancelling it — cancelling
# mid-deploy leaves a conflicting deployment that makes the next run fail fast
# with "Deployment failed, try again later".
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry1.outputs.page_url || steps.deployment_retry2.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      # GitHub's Pages publish backend intermittently returns
      # "Deployment failed, try again later" right after the deployment is
      # created (~1/3 of runs, unrelated to our content). Auto-retry up to
      # 3 times total so it self-heals instead of needing a manual re-run.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 15
      - id: deployment_retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        run: sleep 30
      - id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
