name: Deploy Pages
on:
  push:
    branches: [main]
    paths-ignore:
      - 'preferences.json'   # アプリの保存コミットでは再デプロイしない
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
# Pages allows only one in-progress deployment per environment. Queue new
# runs and let the running one finish instead of cancelling it — cancelling
# mid-deploy leaves a conflicting deployment that makes the next run fail fast
# with "Deployment failed, try again later".
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
